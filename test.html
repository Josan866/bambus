<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" name="viewport" content="width=device_width, initial-scale=1.0">
    <title>Bambustal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-image: url("bilder/bambushintergrund2.png");
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: rgb(100, 170, 100);
        }
    </style>
</head>
<body>
    <nav>
    <a class="btn_top" href="./">Zurück</a>
    <!--<a class="btn_top" href="./">Zurdsa</a>-->
    </nav>
    <div class="box">
        <h1>Der Bambustale Uprank Test</h1>
    </div>
    <div class="box">
        <div class="papier">
            <form action="./" method="GET">
                <div class="content">
                    <label for="name">Dein Name:</label><br>
                    <input type="text" id="name" name="name" required>
                </div>
                    <div class="content">
                    <p>Bitte wähle deinen Rang aus:</p>
                    <div style="text-align:left;transform:translate(40%);">
                        <input type="radio" name="jueng" id="jueng"><label for="jueng">Jüngling</label><br>
                        <input type="radio" name="jueng" id="mittel"><label for="mittel">Älter</label><br>
                        <input type="radio" name="jueng" id="alt"><label for="alt">Noch Älter</label><br>
                        <input type="radio" name="jueng" id="sehr_alt"><label for="sehr_alt">Noch noch Älter</label><br>
                        <input type="radio" name="jueng" id="am_aeltesten"><label for="am_aeltesten">Noch noch noch Älter</label><br>
                    </div>
                </div>
                <br><br><input type="submit" value="Einreichen">
            </form>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
